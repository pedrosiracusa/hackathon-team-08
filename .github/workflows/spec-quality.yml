name: Lint Markdown and Spec Quality

on:
  push:
    branches: [ main, develop, "spec/**" ]
  pull_request:
    paths:
      - "**.md"
      - ".specs/**"
      - "docs/**"

permissions:
  contents: read

jobs:
  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            **/*.md
            !node_modules
            !backend/target
            !frontend/.next

  spec-traceability:
    name: REQ-ID traceability check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Find REQ-IDs without tests
        run: |
          set -e
          if [ -d ".specs" ]; then
            echo "Checking REQ-ID traceability across .specs/ and source/test files..."
            grep -rE "REQ-[A-Z]+-[0-9]+" .specs/ -h | grep -oE "REQ-[A-Z]+-[0-9]+" | sort -u > /tmp/reqs-spec.txt || true
            grep -rE "@implements REQ-[A-Z]+-[0-9]+|REQ-[A-Z]+-[0-9]+" backend/src frontend 2>/dev/null | grep -oE "REQ-[A-Z]+-[0-9]+" | sort -u > /tmp/reqs-code.txt || true
            comm -23 /tmp/reqs-spec.txt /tmp/reqs-code.txt > /tmp/missing.txt || true
            if [ -s /tmp/missing.txt ]; then
              echo "::warning::REQ-IDs declared in .specs/ but not referenced in code:"
              cat /tmp/missing.txt
            else
              echo "All REQ-IDs are traced."
            fi
          else
            echo "No .specs/ directory yet. Skipping traceability check."
          fi
