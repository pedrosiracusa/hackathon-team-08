<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" font-family="Inter, system-ui, sans-serif">
  <rect width="1200" height="500" fill="#F7F7F5"/>

  <text x="60" y="60" fill="#B33816" font-family="JetBrains Mono, monospace" font-size="16" font-weight="500" letter-spacing="1.9">LEGACY · SIFAP 1.0 · 1997</text>
  <text x="60" y="110" fill="#1A1A1A" font-size="42" font-weight="500" letter-spacing="-0.8">Why SIFAP must change</text>
  <text x="60" y="148" fill="#737373" font-size="20">Four pain points compounding after 29 years in production</text>

  <g transform="translate(60, 200)">
    <rect width="260" height="240" fill="#FFFFFF" stroke="#CECEC7" stroke-width="1"/>
    <rect x="0" y="0" width="260" height="6" fill="#F25022"/>
    <text x="24" y="50" fill="#B33816" font-family="JetBrains Mono, monospace" font-size="11" font-weight="500" letter-spacing="1.2">TECHNICAL DEBT</text>
    <text x="24" y="120" fill="#F25022" font-size="72" font-weight="300" letter-spacing="-2">287K</text>
    <text x="24" y="155" fill="#737373" font-family="JetBrains Mono, monospace" font-size="12" letter-spacing="1.2">LINES OF NATURAL</text>
    <text x="24" y="195" fill="#3A3A3A" font-size="15">Business rules buried in</text>
    <text x="24" y="216" fill="#3A3A3A" font-size="15">undocumented subroutines.</text>
  </g>

  <g transform="translate(340, 200)">
    <rect width="260" height="240" fill="#FFFFFF" stroke="#CECEC7" stroke-width="1"/>
    <rect x="0" y="0" width="260" height="6" fill="#F25022"/>
    <text x="24" y="50" fill="#B33816" font-family="JetBrains Mono, monospace" font-size="11" font-weight="500" letter-spacing="1.2">KNOWLEDGE LOSS</text>
    <text x="24" y="120" fill="#F25022" font-size="72" font-weight="300" letter-spacing="-2">0</text>
    <text x="24" y="155" fill="#737373" font-family="JetBrains Mono, monospace" font-size="12" letter-spacing="1.2">ORIGINAL AUTHORS</text>
    <text x="24" y="195" fill="#3A3A3A" font-size="15">The team that wrote it</text>
    <text x="24" y="216" fill="#3A3A3A" font-size="15">has retired.</text>
  </g>

  <g transform="translate(620, 200)">
    <rect width="260" height="240" fill="#FFFFFF" stroke="#CECEC7" stroke-width="1"/>
    <rect x="0" y="0" width="260" height="6" fill="#F25022"/>
    <text x="24" y="50" fill="#B33816" font-family="JetBrains Mono, monospace" font-size="11" font-weight="500" letter-spacing="1.2">TEST COVERAGE</text>
    <text x="24" y="120" fill="#F25022" font-size="72" font-weight="300" letter-spacing="-2">&lt;5%</text>
    <text x="24" y="155" fill="#737373" font-family="JetBrains Mono, monospace" font-size="12" letter-spacing="1.2">AUTOMATED TESTS</text>
    <text x="24" y="195" fill="#3A3A3A" font-size="15">Every change is a gamble.</text>
    <text x="24" y="216" fill="#3A3A3A" font-size="15">Regressions are discovered</text>
    <text x="24" y="237" fill="#3A3A3A" font-size="15">in production.</text>
  </g>

  <g transform="translate(900, 200)">
    <rect width="240" height="240" fill="#FFFFFF" stroke="#CECEC7" stroke-width="1"/>
    <rect x="0" y="0" width="240" height="6" fill="#F25022"/>
    <text x="24" y="50" fill="#B33816" font-family="JetBrains Mono, monospace" font-size="11" font-weight="500" letter-spacing="1.2">VELOCITY</text>
    <text x="24" y="120" fill="#F25022" font-size="72" font-weight="300" letter-spacing="-2">6w</text>
    <text x="24" y="155" fill="#737373" font-family="JetBrains Mono, monospace" font-size="12" letter-spacing="1.2">PER SMALL FEATURE</text>
    <text x="24" y="195" fill="#3A3A3A" font-size="15">Business changes wait</text>
    <text x="24" y="216" fill="#3A3A3A" font-size="15">weeks for delivery.</text>
  </g>
</svg>
